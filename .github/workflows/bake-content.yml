name: Bake Content Index

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bake:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Generate content-index.js and bust cache in index.html
        run: |
          python3 - <<'PYEOF'
          import os, json, re, hashlib

          def parse_txt(path, slug):
              with open(path, encoding="utf-8") as f:
                  raw = f.read()
              lines = raw.split("\n")
              meta = {"title": slug, "date": "", "type": "blog"}
              content_start = len(lines)
              for i, line in enumerate(lines):
                  if line.strip() == "---":
                      content_start = i + 1
                      break
                  m = re.match(r"^(\w+)\s*:\s*(.+)$", line)
                  if m:
                      meta[m.group(1).lower()] = m.group(2).strip()
              content = "\n".join(lines[content_start:]).strip()
              return {**meta, "slug": slug, "content": content}

          # ── Collect blogs ──────────────────────────────────────────────────
          posts = []
          if os.path.isdir("blogs"):
              for fname in sorted(os.listdir("blogs")):
                  if fname.endswith(".txt") and not fname.startswith("."):
                      slug = fname[:-4]
                      try:
                          posts.append(parse_txt(os.path.join("blogs", fname), slug))
                          print(f"  + blog: {fname}")
                      except Exception as e:
                          print(f"  ! skipped {fname}: {e}")

          # ── Collect photos ─────────────────────────────────────────────────
          exts = {".jpg", ".jpeg", ".png", ".webp"}
          photos = []
          if os.path.isdir("photos"):
              photos = sorted([
                  f for f in os.listdir("photos")
                  if os.path.splitext(f)[1].lower() in exts
                  and not f.startswith(".")
              ])
              for p in photos:
                  print(f"  + photo: {p}")

          # ── Write content-index.js ─────────────────────────────────────────
          js  = "// AUTO-GENERATED -- do not edit manually.\n"
          js += "// Rebuilt by GitHub Actions on every push.\n"
          js += "window.SITE_CONTENT = "
          js += json.dumps({"posts": posts, "photos": photos}, ensure_ascii=False, indent=2)
          js += ";\n"

          with open("content-index.js", "w", encoding="utf-8") as f:
              f.write(js)

          # ── Compute hash of content-index.js ──────────────────────────────
          digest = hashlib.md5(js.encode()).hexdigest()[:10]
          print(f"\ncontent hash: {digest}")

          # ── Stamp the hash into index.html ────────────────────────────────
          with open("index.html", "r", encoding="utf-8") as f:
              html = f.read()

          # Replace any existing ?v=... or the placeholder __CONTENT_VERSION__
          html = re.sub(
              r'(content-index\.js\?v=)[^\'"]+',
              rf'\g<1>{digest}',
              html
          )
          # Also handle the very first deploy where placeholder hasn't been stamped yet
          html = html.replace(
              'content-index.js?v=__CONTENT_VERSION__',
              f'content-index.js?v={digest}'
          )

          with open("index.html", "w", encoding="utf-8") as f:
              f.write(html)

          print(f"index.html stamped with ?v={digest}")
          print(f"\nDone: {len(posts)} post(s), {len(photos)} photo(s)")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content-index.js index.html
          if git diff --staged --quiet; then
            echo "Nothing changed."
          else
            git commit -m "chore: rebuild content index [skip ci]"
            git push origin main
          fi
