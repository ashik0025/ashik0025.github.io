name: Bake Content Index

on:
  push:
    branches: [main]

jobs:
  bake:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate content-index.js
        run: |
          python3 - <<'PYEOF'
          import os, json, re

          def parse_txt(path, slug):
              with open(path, encoding="utf-8") as f:
                  raw = f.read()
              lines = raw.split("\n")
              meta = {"title": slug, "date": "", "type": "blog"}
              content_start = len(lines)
              for i, line in enumerate(lines):
                  if line.strip() == "---":
                      content_start = i + 1
                      break
                  m = re.match(r"^(\w+)\s*:\s*(.+)$", line)
                  if m:
                      meta[m.group(1).lower()] = m.group(2).strip()
              content = "\n".join(lines[content_start:]).strip()
              return {**meta, "slug": slug, "content": content}

          # ── Blogs ──────────────────────────────────────
          blog_dir = "blogs"
          posts = []
          if os.path.isdir(blog_dir):
              for fname in sorted(os.listdir(blog_dir)):
                  if fname.endswith(".txt") and not fname.startswith("."):
                      slug = fname[:-4]
                      try:
                          posts.append(parse_txt(os.path.join(blog_dir, fname), slug))
                      except Exception as e:
                          print(f"Warning: skipped {fname}: {e}")

          # ── Photos ─────────────────────────────────────
          photo_dir = "photos"
          exts = {".jpg", ".jpeg", ".png", ".webp"}
          photos = []
          if os.path.isdir(photo_dir):
              photos = sorted([
                  f for f in os.listdir(photo_dir)
                  if os.path.splitext(f)[1].lower() in exts
                  and not f.startswith(".")
              ])

          # ── Write JS ───────────────────────────────────
          js = "// AUTO-GENERATED — do not edit. Rebuilt on every push.\n"
          js += "window.SITE_CONTENT = "
          js += json.dumps({"posts": posts, "photos": photos}, ensure_ascii=False, indent=2)
          js += ";\n"

          with open("content-index.js", "w", encoding="utf-8") as f:
              f.write(js)

          print(f"content-index.js: {len(posts)} posts, {len(photos)} photos")
          PYEOF

      - name: Commit content-index.js
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content-index.js
          git diff --staged --quiet && echo "No changes." || \
            (git commit -m "chore: rebuild content index [skip ci]" && git push)
